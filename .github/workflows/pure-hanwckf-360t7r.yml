name: ImmortalWrt-MT798x-24.10-360T7-108M

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean:
        description: 'clean ccache'
        default: 'false'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 360t7.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v4

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential gawk gcc-multilib g++-multilib gettext libncurses-dev python3-distutils zlib1g-dev libssl-dev libelf-dev m4 quilt msmtp texinfo libslang2-dev libpcre3-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FIRMWARE_VERSION=$(date +"%y.%m.%d")" >> $GITHUB_ENV
        echo "RELEASE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: 下载源码
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新及安装软件源
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # --- 核心锁定：针对 108M 大分区 ---
        # 确保删除默认节点，并尝试匹配 108M 或大分区专用节点
        # 注意：部分源码中 108M 的节点名可能是 qihoo_360t7-108m 或使用特定的分区表定义
        sed -i '/CONFIG_TARGET_mediatek_mt7981_DEVICE_abt_asr3000/d' .config
        sed -i '/CONFIG_TARGET_mediatek_mt7981_DEVICE_qihoo_360t7/d' .config
        
        # 写入 108M 大分区版专用机型定义（具体取决于源码 package/linux/mediatek/image/mt7981.mk 里的定义）
        # 如果源码中没有专门的 -108m 节点，通常通过修改 dts 或配置来实现
        echo "CONFIG_TARGET_mediatek_mt7981_DEVICE_qihoo_360t7=y" >> .config
        
        make defconfig

    - name: 下载包
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理固件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages ./*.json ./*.manifest ./*.buildinfo ./sha256sums
        for file in $(ls *360*t7*sysupgrade.bin 2>/dev/null); do
          mv "$file" "${{ env.FIRMWARE_VERSION }}-360T7-108M-6.6-sysupgrade.bin"
        done
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Github Action 空间
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: 360T7-108M-6.6-${{ env.FIRMWARE_VERSION }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: 创建 Release 标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        release_tag="360T7-108M-6.6-${{ env.RELEASE_DATE }}"
        echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
        echo "## 360T7 108M 大分区版 (6.6内核)
        - 分区布局: **108M 大分区**
        - 源码: padavanonly/immortalwrt-mt798x-6.6
        - 包含插件: OpenClash, 闭源无线驱动等" > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_PATH }}/*
        token: ${{ secrets.GITHUB_TOKEN }}
