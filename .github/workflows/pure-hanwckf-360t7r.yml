name: pure-360T7-108M-padavanonly-6.6

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean:
        description: '是否清理 ccache'
        default: 'false'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: pure.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        # 针对 6.6 内核增加了 llvm/clang 等必要组件，并补齐了 Ruby 编译依赖
        sudo -E apt-get -qq install build-essential clang llvm flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils python3-pyelftools rsync swig unzip zlib1g-dev libevdev-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FIRMWARE_VERSION=$(date +"%y%m%d")" >> $GITHUB_ENV
        echo "START_DATE=$(date +'%Y年%m月%d日 %H点%M分%S秒')" >> $GITHUB_ENV
        
    - name: 下载源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: 加载软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: 更新软件源
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装软件源
      run: cd openwrt && ./scripts/feeds install -a

    - name: 处理 108M 闪存与冲突插件
      run: |
        cd openwrt
        echo "🔧 正在针对 108M 闪存版本进行底层优化..."
        
        # 24.10 强制使用 Firewall4，删除与 nftables 冲突的旧版插件
        # 确保 OpenClash 作为唯一代理，防止 iptables 规则残留导致断网
        for pkg in luci-app-fchomo luci-app-homeproxy nikki luci-app-passwall2; do
          find package/feeds -name "$pkg" -type d -exec rm -rf {} \; 2>/dev/null || true
        done
        echo "✅ 依赖库清理完成"

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 核心步骤：根据你的 config 刷新依赖，避免内核特性缺失
        make defconfig
        
    - name: 下载编译资源包
      id: package
      run: |
        cd openwrt
        make download -j16
        find dl -size -1024c -exec rm -f {} \;
        
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # padavanonly 的源码建议初次编译开启 V=s 方便排错，或使用多线程
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: 整理固件文件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 进入 MT7981 芯片组对应的输出目录
        cd openwrt/bin/targets/mediatek/mt7981
        rm -rf packages version.buildinfo profiles.json *rootfs* *kernel* *.manifest sha256sums
        
        # 自动重命名 108M 专用固件
        mv *sysupgrade.bin ${{ env.FIRMWARE_VERSION }}-360T7-108M-6.6-sysupgrade.bin || true
        mv *factory.bin ${{ env.FIRMWARE_VERSION }}-360T7-108M-6.6-factory.bin || true
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: 上传固件至 Artifacts
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.FIRMWARE_VERSION }}-360T7-108M-Solid
        path: ${{ env.FIRMWARE }}
        
    - name: 创建 GitHub Release
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
         time=$(date +%Y.%m.%d)
         release_tag="360T7-108M-padavanonly-6.6-$time"
         echo "### 360T7 108M 高性能版
         - **内核版本**: Linux 6.6 (padavanonly)
         - **驱动**: MTK SDK 原厂无线驱动 (支持快速漫游/HE160)
         - **加速**: 已内置 TurboAcc (HNAT/BBR)
         - **默认 IP**: 192.168.1.1
         - **特色**: 集成 OpenClash, Zerotier, DDNS-GO">> release.txt
         echo "release_name=$release_tag" >> $GITHUB_OUTPUT
         echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
         echo "status=success" >> $GITHUB_OUTPUT
        
    - name: 发布至 Release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          name: ${{ steps.tag.outputs.release_name }} 
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

    - name: 自动清理历史运行
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3
