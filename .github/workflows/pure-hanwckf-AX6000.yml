name: ImmortalWrt-MT798x-24.10-AX6000

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean:
        description: 'clean ccache'
        default: 'false'

env:
  # 使用具有 6.6 内核支持的分支地址
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ax6000.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v4

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential gawk gcc-multilib g++-multilib gettext libncurses-dev python3-distutils zlib1g-dev libssl-dev libelf-dev m4 quilt msmtp texinfo libslang2-dev libpcre3-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FIRMWARE_VERSION=$(date +"%y.%m.%d")" >> $GITHUB_ENV

    - name: 下载源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新及安装软件源
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 禁用冲突插件
      run: |
        cd openwrt
        # 24.10 分支下 Rust 插件极度吃资源，AX6000 虽强但编译时也容易挂，预先清理
        find package/feeds -name "dns2socks-rust" -type d -exec rm -rf {} \; 2>/dev/null || true
        find package/feeds -name "luci-app-homeproxy" -type d -exec rm -rf {} \; 2>/dev/null || true

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # --- 核心锁定：确保是大分区版 (非 Stock) ---
        # 强制删除官方分区配置，启用大分区节点
        sed -i '/CONFIG_TARGET_mediatek_mt7986_DEVICE_xiaomi_redmi-router-ax6000-stock/d' .config
        echo "CONFIG_TARGET_mediatek_mt7986_DEVICE_xiaomi_redmi-router-ax6000=y" >> .config
        
        # 针对 6.6 内核与 24.10 分支的优化参数
        echo "CONFIG_TARGET_OPTIONS=y" >> .config
        echo "CONFIG_TARGET_OPTIMIZATION=\"-O2 -pipe -march=armv8-a+crypto+crc\"" >> .config
        
        make defconfig

    - name: 下载包
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理固件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages ./*.json ./*.manifest ./*.buildinfo ./sha256sums
        
        # 改名时突出“大分区”和“6.6内核”
        for file in $(ls *ax6000*sysupgrade.bin 2>/dev/null); do
          mv "$file" "${{ env.FIRMWARE_VERSION }}-AX6000-BigPartition-6.6-sysupgrade.bin"
        done
        for file in $(ls *ax6000*factory.bin 2>/dev/null); do
          mv "$file" "${{ env.FIRMWARE_VERSION }}-AX6000-BigPartition-6.6-factory.bin"
        done
        
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Github Action 空间
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: AX6000-BigPartition-6.6-${{ env.FIRMWARE_VERSION }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: 创建 Release 标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        release_tag="AX6000-BigPartition-6.6-$(date +%Y.%m.%d-%H%M)"
        echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
        echo "## Redmi AX6000 大分区版 (6.6内核)
        - 源码: padavanonly/immortalwrt-mt798x-6.6
        - 默认 IP: 192.168.31.1
        - 分区布局: **大分区 (Big Partition)**
        - 注意: 请确保已刷入第三方 U-Boot，切勿在官方原厂固件界面直接升级！" > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_PATH }}/*
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除工作流运行
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3
