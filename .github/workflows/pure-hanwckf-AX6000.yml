name: pure-padavanonly-AX6000-24.10-6.6

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean:
        description: '是否清理ccache'
        default: 'false'

# ==================== 环境变量配置 ====================
env:
  # 源码地址保持不变，但分支建议确认该仓库是否有 ax6000 专版，通常 24.10-6.6 是通用的
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: 24.10-6.6
  FEEDS_CONF: feeds.conf.default
  # 建议你的配置文件名也改为 ax6000 相关
  CONFIG_FILE: ax6000.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

# ==================== 编译任务定义 ====================
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # [1] 检出仓库代码
    - name: 检出项目分支源码
      uses: actions/checkout@main

    # [2] 释放磁盘空间 (红米AX6000内核及驱动较多，建议保留此步骤)
    - name: 释放编译环境磁盘空间 (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # [3] 初始化编译环境
    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-mark hold grub-efi-amd64-signed
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # [4] 克隆源码
    - name: 克隆 ImmortalWrt 源码仓库
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth 1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # [5] 加载自定义 feeds
    - name: 加载自定义 feeds 配置
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds 索引
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds 软件包
      run: cd openwrt && ./scripts/feeds install -a

    # [8] 加载自定义编译配置 (针对 AX6000)
    - name: 加载自定义编译配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        # 针对 AX6000 硬件架构刷新配置
        make defconfig

    # [9] 预下载
    - name: 预下载软件包
      id: package
      run: |
        cd openwrt
        make download -j16
        find dl -size -1024c -exec rm -f {} \;

    # [10] 编译固件
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        export USE_CCACHE=1
        export CCACHE_DIR="$PWD/.ccache"
        echo "🔧 编译线程数: $(nproc)"
        # AX6000 编译耗时较长，增加线程并发
        make -j$(($(nproc) + 1)) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # [12] 整理固件文件
    - name: 整理固件文件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 进入红米 AX6000 对应的输出目录 (通常是 mediatek/mt7986)
        cd openwrt/bin/targets/mediatek/mt7986
        rm -rf packages
        # 识别红米AX6000特有的固件后缀（通常包含 stock-layout 或 ubifs）
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # [13] 上传固件 (Actions 产物)
    - name: 上传固件 (Actions 产物)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: RedMi-AX6000-OpenWrt${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # [14] 生成 Release 标签 (更新为 AX6000 信息)
    - name: 生成 Release 标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
         time=$(date +%Y.%m.%d)
         release_tag="AX6000-ImmortalWrt-2410-$time"
         release_name="红米AX6000-ImmortalWrt-2410-6.6内核-$time"

         cat > release.txt <<EOF
         ## 🚀 红米 AX6000 (RB06) 精简固件
         - 🎯 设备：Xiaomi Redmi AX6000
         - ⚙️ 内核：Linux 6.6 (padavanonly 源码)
         - 📅 构建时间：$time
         - 🌐 默认网关：192.168.31.1
         - 🔑 默认密码：无
         - 📦 集成插件：TurboAcc, MosDNS
         
         > 注意：本固件适用于红米AX6000，请确保已开启 SSH 并刷入 U-Boot。
         EOF

         echo "release_name=$release_name" >> $GITHUB_OUTPUT
         echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
         echo "status=success" >> $GITHUB_OUTPUT

    # [15] 发布
    - name: 发布固件到 GitHub Releases
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ${{ steps.tag.outputs.release_name }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
